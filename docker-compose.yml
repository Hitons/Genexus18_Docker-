services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: gx-sqlserver
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: GeneXus2024!
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - genexus-network

  gxapp_amd64:
    container_name: gx-webapp-amd64
    platform: linux/amd64
    build:
      context: ./app
      dockerfile: Dockerfile
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "false"
      ConnectionStrings__Default: >
        Server=sqlserver,1433;
        Database=GeneXusDB;
        User Id=sa;
        Password=GeneXus2024!;
        TrustServerCertificate=True
    ports:
      - "8081:80"
    volumes:
      - ./app/publish-amd64:/app
    networks:
      - genexus-network
    restart: unless-stopped

  gxapp_arm64:
    container_name: gx-webapp-arm64
    platform: linux/arm64
    build:
      context: ./app
      dockerfile: Dockerfile
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "false"
      ConnectionStrings__Default: >
        Server=sqlserver,1433;
        Database=GeneXusDB;
        User Id=sa;
        Password=GeneXus2024!;
        TrustServerCertificate=True
    ports:
      - "8082:80"
    volumes:
      - ./app/publish-arm64:/app
    networks:
      - genexus-network
    restart: unless-stopped

networks:
  genexus-network:
    driver: bridge

volumes:
  sqlserver-data:
    driver: local
